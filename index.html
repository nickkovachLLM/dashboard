<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nick's Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  /* Login */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    gap: 16px;
    width: 100%;
    max-width: 360px;
  }
  #login-screen h1 { font-size: 1.5rem; color: #a78bfa; }
  #login-screen input {
    width: 100%;
    padding: 12px 16px;
    background: #0f0f23;
    border: 1px solid #334155;
    border-radius: 8px;
    color: #e2e8f0;
    font-size: 1rem;
    text-align: center;
    letter-spacing: 0.1em;
  }
  #login-screen input:focus { outline: none; border-color: #a78bfa; }
  #login-btn {
    width: 100%;
    padding: 12px;
    background: #a78bfa;
    border: none;
    border-radius: 8px;
    color: #1a1a2e;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }
  #login-btn:hover { background: #c4b5fd; }
  #login-error { color: #f87171; font-size: 0.875rem; min-height: 1.25rem; }
  /* Dashboard */
  #dashboard { display: none; width: 100%; max-width: 640px; }
  header {
    text-align: center;
    margin-bottom: 32px;
  }
  header h1 { font-size: 1.75rem; color: #c4b5fd; font-weight: 700; }
  header p { color: #94a3b8; margin-top: 4px; }
  section { margin-bottom: 28px; }
  section h2 {
    font-size: 0.875rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #64748b;
    margin-bottom: 12px;
  }
  .card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #0f0f23;
    border: 1px solid #1e293b;
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 8px;
  }
  .ticker { font-weight: 700; font-size: 1rem; min-width: 56px; }
  .price { font-size: 1rem; color: #cbd5e1; flex: 1; }
  .change { font-size: 0.9rem; }
  .weather-card {
    background: #0f0f23;
    border: 1px solid #1e293b;
    border-radius: 10px;
    padding: 16px 18px;
    font-size: 1rem;
    line-height: 1.8;
  }
  .check-item {
    padding: 8px 0;
    border-bottom: 1px solid #1e293b;
    font-size: 0.95rem;
    line-height: 1.4;
  }
  .check-item:last-child { border-bottom: none; }
  footer {
    margin-top: 32px;
    color: #475569;
    font-size: 0.8rem;
    text-align: center;
  }
  @media (max-width: 480px) {
    header h1 { font-size: 1.4rem; }
    .card { padding: 12px 14px; }
  }
</style>
</head>
<body>

<div id="login-screen">
  <h1>🔐 Dashboard</h1>
  <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password">
  <button id="login-btn" onclick="checkPassword()">Enter</button>
  <div id="login-error"></div>
</div>

<div id="dashboard">
  <header>
    <h1>Good Morning, Nick</h1>
    <p>Thursday, June 4, 2026</p>
  </header>

  <section>
    <h2>📈 Markets</h2>
    
    <div class="card">
      <span class="ticker">NVDA</span>
      <span class="price">$218.66</span>
      <span class="change"><span style="color:#4ade80">▲ 1.8%</span></span>
    </div>

    <div class="card">
      <span class="ticker">TSLA</span>
      <span class="price">$418.45</span>
      <span class="change"><span style="color:#f87171">▼ 1.2%</span></span>
    </div>

    <div class="card">
      <span class="ticker">CHWY</span>
      <span class="price">$20.82</span>
      <span class="change"><span style="color:#f87171">▼ 1.0%</span></span>
    </div>
  </section>

  <section>
    <h2>🌤️ Weather</h2>
    <div class="weather-card">🌧️ Richardson, Texas   &nbsp; Light Rain<br>
       <small style="color:#94a3b8">High null°F / Low null°F</small></div>
  </section>

  <section>
    <h2>📋 This Week</h2>
    <div class="check-item" style="color:#e2e8f0">□ Test the dashboard</div>
<div class="check-item" style="color:#e2e8f0">□ Review NVDA position</div>
  </section>

  <footer>Last updated: June 4, 2026 at 9:26 PM</footer>
</div>

<script>
(function () {
  var HASH = 'bf3c882bee7b65809ca8d8f5649c5d6d2df99c860faade3cad4ec11e10433fcf';

  function hexSHA256(str) {
    var buf = new TextEncoder().encode(str);
    return crypto.subtle.digest('SHA-256', buf).then(function (hashBuf) {
      return Array.from(new Uint8Array(hashBuf))
        .map(function (b) { return b.toString(16).padStart(2, '0'); })
        .join('');
    });
  }

  // Restore session
  if (sessionStorage.getItem('dashboard_auth') === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  }

  window.checkPassword = function () {
    var pw = document.getElementById('pw-input').value;
    hexSHA256(pw).then(function (h) {
      if (h === HASH) {
        sessionStorage.setItem('dashboard_auth', '1');
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
      } else {
        document.getElementById('login-error').textContent = 'Incorrect password';
        document.getElementById('pw-input').value = '';
        document.getElementById('pw-input').focus();
      }
    });
  };

  document.getElementById('pw-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') window.checkPassword();
  });
})();
</script>
</body>
</html>
